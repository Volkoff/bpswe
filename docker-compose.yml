version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: bpswe-db
    restart: always
    environment:
      MYSQL_DATABASE: hosting_center
      MYSQL_USER: student
      MYSQL_PASSWORD: "T!gfwo&*24@!gjw!5%"
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/database.sql:/docker-entrypoint-initdb.d/database.sql

  web:
    build: .
    container_name: bpswe-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DB_HOST: mysql
      DB_PORT: "3306"
    volumes:
      - ./www:/var/www

  ftp:
    build: ./ftp
    container_name: bpswe-ftp
    restart: always
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
    depends_on:
      - mysql
    volumes:
      - ./ftp/pureftpd-mysql.conf:/etc/pure-ftpd/pureftpd-mysql.conf:ro
      - ./www:/var/www

  apache:
    build: ./apache
    container_name: bpswe-apache
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./apache/httpd.conf:/usr/local/apache2/conf/httpd.conf
      - ./www:/var/www

volumes:
  mysql_data: