version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: bpswe-db
    restart: always
    environment:
      POSTGRES_DB: hosting_center
      POSTGRES_USER: student
      POSTGRES_PASSWORD: T!gfwo&*24@!gjw!5%
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/database.sql:/docker-entrypoint-initdb.d/database.sql

  web:
    build: .
    container_name: bpswe-app
    restart: always
    depends_on:
      - postgres
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development

  ftp:
    image: stilliard/pure-ftpd:hardened
    container_name: bpswe-ftp
    restart: always
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      PUBLICHOST: "localhost"
      FTP_USER_NAME: "ftpuser"      
      FTP_USER_PASS: "1234"
      FTP_USER_HOME: "/home/ftpuser"
    volumes:
      - ./ftpdata:/home/ftpuser   

volumes:
  postgres_data:
