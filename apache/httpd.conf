ServerName mojefirma.cz

LoadModule unixd_module modules/mod_unixd.so
LoadModule authz_core_module modules/mod_authz_core.so
LoadModule dir_module modules/mod_dir.so
LoadModule mpm_event_module modules/mod_mpm_event.so
LoadModule log_config_module modules/mod_log_config.so
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule ssl_module modules/mod_ssl.so
LoadModule rewrite_module modules/mod_rewrite.so

Listen 80
Listen 443

# HTTP → HTTPS redirect
<VirtualHost *:80>
    ServerName www.mojefirma.cz
    ServerAlias mojefirma.cz

    # pro pristup bez certbota
    # ProxyPreserveHost On
    # ProxyPass / http://web:5000/
    # ProxyPassReverse / http://web:5000/
    # ErrorLog logs/error.log
    # CustomLog logs/access.log common

    #DocumentRoot "/var/www/certbot"

    #Alias /.well-known/acme-challenge/ "/var/www/certbot/.well-known/acme-challenge/"

    # <Directory "/var/www/certbot/.well-known/acme-challenge/">
    #     AllowOverride None
    #     Options None
    #     Require all granted
    # </Directory>

    RewriteEngine On
    RewriteRule ^/(.*)$ https://www.mojefirma.cz/$1 [R=301,L]
    # RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
    # RewriteCond %{REQUEST_URI} !^/.well-known/acme-challenge/
    
</VirtualHost>

<VirtualHost *:80>
    ServerName eshop.mojefirma.cz
    RewriteEngine On
    RewriteRule ^/(.*)$ https://eshop.mojefirma.cz/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:80>
    ServerName blog.mojefirma.cz
    RewriteEngine On
    RewriteRule ^/(.*)$ https://blog.mojefirma.cz/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:80>
    ServerName admin.mojefirma.cz
    RewriteEngine On
    RewriteRule ^/(.*)$ https://admin.mojefirma.cz/$1 [R=301,L]
</VirtualHost>

# Asi nedává smysl
# <VirtualHost *:80>
#     ServerName ftp.mojefirma.cz
#     RewriteEngine On
#     RewriteRule ^/(.*)$ https://admin.mojefirma.cz/$1 [R=301,L]
# </VirtualHost>

# Wildcard fallback (možná není třeba, ale radši nechat)
<VirtualHost *:80>
    ServerName fallback.mojefirma.cz
    ServerAlias *.mojefirma.cz

    RewriteEngine On
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
</VirtualHost>



# HTTPS virtual host
<VirtualHost *:443>
    ServerName mojefirma.cz
    ServerAlias *.mojefirma.cz

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/server.key
    # SSLCertificateFile /etc/letsencrypt/live/mojefirma.cz/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/mojefirma.cz/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://web:5000/
    ProxyPassReverse / http://web:5000/

    ErrorLog logs/error.log
    CustomLog logs/access.log common
</VirtualHost>

<VirtualHost *:443>
    ServerName eshop.mojefirma.cz

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/server.key

    ProxyPreserveHost On
    ProxyPass / http://web:5000/
    ProxyPassReverse / http://web:5000/

    ErrorLog logs/eshop-error.log
    CustomLog logs/eshop-access.log common
</VirtualHost>

<VirtualHost *:443>
    ServerName blog.mojefirma.cz

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/server.key

    ProxyPreserveHost On
    ProxyPass / http://web:5000/
    ProxyPassReverse / http://web:5000/

    ErrorLog logs/blog-error.log
    CustomLog logs/blog-access.log common
</VirtualHost>

<VirtualHost *:443>
    ServerName admin.mojefirma.cz

    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/server.key

    ProxyPreserveHost On
    ProxyPass / http://web:5000/
    ProxyPassReverse / http://web:5000/

    ErrorLog logs/admin-error.log
    CustomLog logs/admin-access.log common
</VirtualHost>

