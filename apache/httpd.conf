# Wildcard fallback
<VirtualHost *:443>
    ServerAlias *.mojefirma.cz
    
    SSLEngine on
    SSLCertificateFile /usr/local/apache2/conf/server.crt
    SSLCertificateKeyFile /usr/local/apache2/conf/server.key
    
    #DocumentRoot "/var/www/%{HTTP_HOST}"
    VirtualDocumentRoot "/var/www/%2/%1"
    
    <Directory "/var/www">
        Require all granted
        AllowOverride All
        Options Indexes FollowSymLinks
    </Directory>
    
    ErrorLog logs/hosting-error.log
    CustomLog logs/hosting-access.log common
</VirtualHost>
