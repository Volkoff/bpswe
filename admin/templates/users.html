<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <a href="/">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/domains">Domains</a>
    <a href="/ftp">FTP</a>
    <a href="/databases">Databases</a>
</nav>

<div class="container">
    <h1>Users</h1>
    <table>
        <tr>
            <th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Home directory</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.user_id }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>{{ user.home_directory }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
