<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav>
    <a href="/">Dashboard</a>
    <a href="/users">Users</a>
    <a href="/domains">Domains</a>
    <a href="/ftp">FTP</a>
</nav>

<div class="container">
    <h1>Hosting Center Admin Panel</h1>
    <div class="cards">
        <div class="card"><h3>Users</h3><p>{{ users_count }}</p></div>
        <div class="card"><h3>Domains</h3><p>{{ domains_count }}</p></div>
        <div class="card"><h3>FTP Accounts</h3><p>{{ ftp_count }}</p></div>
        <div class="card"><h3>Databases</h3><p>{{ db_count }}</p></div>
    </div>
</div>
</body>
</html>
